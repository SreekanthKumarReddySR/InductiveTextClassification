<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DBpedia Entity Classification</title>
  <style>
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f3f6fb;
      color: #20232a;
    }
    .page {
      max-width: 860px;
      margin: 40px auto;
      padding: 24px;
      background: #ffffff;
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
      border-radius: 18px;
      border: 1px solid rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 2rem;
    }
    p {
      line-height: 1.7;
      color: #475569;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      padding: 16px;
      font-size: 1rem;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      resize: vertical;
      background: #f8fafc;
      box-sizing: border-box;
    }
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      margin-top: 16px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }
    button:hover {
      transform: translateY(-1px);
      background: #1d4ed8;
    }
    .output {
      margin-top: 22px;
      padding: 18px;
      border-radius: 14px;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      color: #1e293b;
    }
    .output pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      font-size: 0.98rem;
    }
    .status {
      margin-top: 10px;
      color: #475569;
      font-size: 0.95rem;
    }
    .field-label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #1e293b;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>DBpedia Entity Classification</h1>
    <p>Enter a short abstract or entity description, then press <strong>Classify</strong> to get the DBpedia-14 prediction.</p>

    <label class="field-label" for="textInput">Text input</label>
    <textarea id="textInput" placeholder="Paste your entity abstract here..."></textarea>
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <button id="submitBtn">Classify</button>
      <button id="clearBtn" type="button" style="background:#64748b;">Forget</button>
    </div>

    <div class="status" id="status">Ready to classify.</div>
    <div class="output" id="output" style="display:none;"></div>
  </div>

  <script>
    const submitBtn = document.getElementById('submitBtn');
    const clearBtn = document.getElementById('clearBtn');
    const textInput = document.getElementById('textInput');
    const outputBox = document.getElementById('output');
    const statusText = document.getElementById('status');

    const DBPEDIA_14_NAMES = [
      "Company", "EducationalInstitution", "Artist", "Athlete", "OfficeHolder",
      "MeanOfTransportation", "Building", "NaturalPlace", "Village", "Animal",
      "Plant", "Album", "Film", "WrittenWork"
    ];

    async function classifyText() {
      const text = textInput.value.trim();
      if (!text) {
        statusText.textContent = 'Please enter text before classifying.';
        return;
      }
      statusText.textContent = 'Sending request...';
      outputBox.style.display = 'none';
      try {
        const response = await fetch('/predict', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ text })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || 'Prediction failed');
        }

        statusText.textContent = 'Prediction received successfully.';
        outputBox.style.display = 'block';

        // Format probabilities with class names
        let probText = '';
        if (data.probabilities) {
          data.probabilities.forEach((prob, idx) => {
            const name = DBPEDIA_14_NAMES[idx] || `Class ${idx}`;
            probText += `${name}: ${(prob * 100).toFixed(2)}%<br>`;
          });
        }

        outputBox.innerHTML = `
          <strong>Predicted Class:</strong> ${data.class_name} (ID: ${data.class_id})<br><br>
          <strong>Class Probabilities:</strong><br>
          ${probText}
        `;
      } catch (error) {
        statusText.textContent = 'Error: ' + error.message;
        outputBox.style.display = 'block';
        outputBox.innerHTML = `<pre>${error.message}</pre>`;
      }
    }

    function clearInput() {
      textInput.value = '';
      outputBox.style.display = 'none';
      outputBox.innerHTML = '';
      statusText.textContent = 'Input forgotten. Ready to classify.';
      textInput.focus();
    }

    submitBtn.addEventListener('click', classifyText);
    clearBtn.addEventListener('click', clearInput);
    textInput.addEventListener('keydown', event => {
      if (event.key === 'Enter' && (event.ctrlKey || event.metaKey)) {
        classifyText();
      }
    });
  </script>
</body>
</html>
